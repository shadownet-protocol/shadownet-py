name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  id-token: write    # PyPI Trusted Publishing (OIDC)
  contents: write    # creating the GitHub Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/shadownet
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check .

      - name: Type check (mypy --strict)
        run: uv run mypy src/shadownet

      - name: Test
        run: uv run pytest

      - name: Build distribution
        run: uv build

      - name: Verify tag matches package version
        # Both sides go through PEP 440 normalization so the tag (`v0.1.0-rc.1`)
        # and the wheel version (`0.1.0rc1`) compare equal.
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/v}"
          uv run python - "$tag" <<'PY'
          import sys
          from importlib.metadata import version
          from packaging.version import Version
          tag = Version(sys.argv[1])
          pkg = Version(version("shadownet"))
          if tag != pkg:
              raise SystemExit(f"git tag {tag} does not match pyproject version {pkg}")
          print(f"ok: git tag and pyproject both resolve to {tag}")
          PY

      - name: Verify py.typed marker is shipped
        run: |
          unzip -l dist/shadownet-*.whl | grep -q 'shadownet/py\.typed' \
            || { echo "py.typed missing from wheel"; exit 1; }

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `password:` — OIDC binding via the `pypi` environment.

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc.') || contains(github.ref_name, '-alpha.') || contains(github.ref_name, '-beta.') }}
